<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Jinja – Room Decor Accra</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in-up { animation: fadeInUp 0.5s ease-out; }
    .card-hover { transition: all 0.3s; }
    .card-hover:hover { transform: translateY(-8px); box-shadow: 0 20px 25px -5px rgba(0,0,0,0.5); }
    .toast { transition: transform 0.3s ease, opacity 0.3s ease; }
    /* Price overlay on image */
    .price-badge {
      position: absolute;
      bottom: 10px;
      right: 10px;
      background: rgba(10, 25, 47, 0.9);
      backdrop-filter: blur(4px);
      padding: 6px 12px;
      border-radius: 30px;
      font-weight: bold;
      font-size: 1.1rem;
      color: white;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      z-index: 2;
    }
  </style>
</head>
<body class="bg-black text-white font-sans">

  <!-- navigation -->
  <nav id="navbar" class="fixed w-full z-50 transition-all duration-300 bg-black shadow-lg">
    <div class="container mx-auto px-4 py-3 flex justify-between items-center">
      <div class="text-3xl md:text-4xl font-bold cursor-pointer flex items-center" onclick="showPage('home')">
        <span id="logoText" class="bg-gradient-to-r from-[#0A192F] to-white bg-clip-text text-transparent">Jinja</span>
        <img id="logoImg" class="h-14 md:h-16 hidden object-contain" alt="Jinja Logo">
      </div>
      <div class="flex items-center space-x-4 md:space-x-6">
        <a href="#" onclick="showPage('home')" class="hover:text-[#0A192F] transition text-sm md:text-base">Home</a>
        <a href="#" onclick="showPage('shop')" class="hover:text-[#0A192F] transition text-sm md:text-base">Shop</a>
        <a href="#" id="adminNavBtn" onclick="showPage('adminPanel')" class="hover:text-[#0A192F] transition text-sm md:text-base hidden">Admin</a>
        <div class="relative">
          <button onclick="toggleCurrencyDropdown()" class="bg-[#0A192F]/20 px-2 md:px-3 py-2 rounded-lg flex items-center space-x-2 text-sm">
            <i class="fas fa-dollar-sign text-[#0A192F]"></i>
            <span id="currencyCode">GHS</span>
            <i class="fas fa-chevron-down text-xs"></i>
          </button>
          <div id="currencyDropdown" class="absolute right-0 mt-2 w-40 bg-gray-900 border border-[#0A192F] rounded-lg hidden z-50"></div>
        </div>
        <button onclick="showCart()" class="relative">
          <i class="fas fa-shopping-cart text-xl"></i>
          <span id="cartCount" class="absolute -top-2 -right-2 bg-[#0A192F] text-white text-xs rounded-full w-5 h-5 flex items-center justify-center">0</span>
        </button>
      </div>
    </div>
  </nav>

  <div id="app" class="pt-20 min-h-screen pb-16"></div>

  <!-- cart sidebar -->
  <div id="cartSidebar" class="fixed top-0 right-0 w-full md:w-96 h-full bg-gray-900 shadow-2xl transform translate-x-full transition-transform duration-300 z-50 flex flex-col">
    <div class="p-5 flex-1 flex flex-col">
      <div class="flex justify-between items-center mb-4">
        <h2 class="text-2xl font-bold">Your Cart</h2>
        <button onclick="closeCart()" class="text-2xl">&times;</button>
      </div>
      <div id="cartItems" class="flex-1 overflow-y-auto space-y-4"></div>
      <div class="border-t border-gray-700 pt-4 mt-4">
        <div class="flex justify-between text-xl font-bold mb-4">
          <span>Total</span>
          <span id="cartTotal">₵0.00</span>
        </div>
        <button onclick="whatsappBuy()" class="w-full bg-green-600 hover:bg-green-700 py-3 rounded-lg font-semibold transition">Buy via WhatsApp</button>
      </div>
    </div>
  </div>

  <!-- admin modal -->
  <div id="adminModal" class="fixed inset-0 bg-black/80 flex items-center justify-center z-50 hidden">
    <div class="bg-gray-900 rounded-2xl max-w-2xl w-full max-h-[90vh] overflow-y-auto p-6">
      <div class="flex justify-between items-center mb-4">
        <h2 class="text-2xl font-bold" id="modalTitle">Add Product</h2>
        <button onclick="closeAdminModal()" class="text-2xl">&times;</button>
      </div>
      <form id="productForm">
        <input type="text" id="prodName" placeholder="Product name" class="w-full mb-3 p-3 bg-black rounded" required>
        <textarea id="prodDesc" placeholder="Description" rows="3" class="w-full mb-3 p-3 bg-black rounded" required></textarea>
        <input type="number" step="0.01" id="prodPrice" placeholder="Price (USD)" class="w-full mb-3 p-3 bg-black rounded" required>
        <select id="prodCategory" class="w-full mb-3 p-3 bg-black rounded">
          <option>Wall Art</option><option>Lighting</option><option>Cushions</option><option>Vases</option>
          <option>Rugs</option><option>Mirrors</option><option>Plants</option><option>Other</option>
        </select>
        <label class="flex items-center mb-3"><input type="checkbox" id="prodInStock" checked> In Stock</label>
        <div id="existingImagesContainer" class="flex flex-wrap gap-2 mb-3"></div>
        <input type="file" id="prodImages" multiple accept="image/*" class="mb-3">
        <button type="submit" class="w-full bg-[#0A192F] py-3 rounded-lg font-semibold">Save Product</button>
      </form>
    </div>
  </div>

  <!-- toast notification for new products -->
  <div id="newProductToast" class="fixed bottom-6 left-1/2 transform -translate-x-1/2 bg-[#0A192F] text-white px-6 py-3 rounded-lg shadow-xl flex items-center gap-3 z-50 transition-all duration-300 translate-y-20 opacity-0">
    <i class="fas fa-gift text-yellow-400"></i>
    <span>New products added! Refresh to see them.</span>
    <button onclick="window.location.reload()" class="bg-white text-[#0A192F] px-3 py-1 rounded-md text-sm font-semibold">Refresh</button>
    <button onclick="hideToast()" class="text-gray-300 hover:text-white">&times;</button>
  </div>

  <!-- discreet admin login link (gear icon) -->
  <footer class="fixed bottom-2 right-2 z-40">
    <a href="#" onclick="showAdminLogin(); return false;" class="text-gray-700 text-xs hover:text-gray-400 transition" title="Admin Login">⚙️</a>
  </footer>

  <script>
    // ---------- STORAGE KEYS ----------
    const STORAGE = {
      products: 'jinja_products',
      logo: 'jinja_logo',
      cart: 'jinja_cart',
      productCount: 'jinja_product_count'
    };

    let products = [];
    let cart = { items: [] };
    let exchangeRates = { USD: 1 };
    // DEFAULT CURRENCY: GHANA CEDI (GHS)
    let selectedCurrency = { code: 'GHS', symbol: '₵' };
    let logoUrl = null;
    let currentPage = 'home';
    let editingProductId = null;
    let isAdminLoggedIn = false;

    // ---------- TOAST ----------
    function hideToast() {
      const toast = document.getElementById('newProductToast');
      toast.classList.add('translate-y-20', 'opacity-0');
      toast.classList.remove('translate-y-0', 'opacity-100');
    }
    function showNewProductToast() {
      const toast = document.getElementById('newProductToast');
      toast.classList.remove('translate-y-20', 'opacity-0');
      toast.classList.add('translate-y-0', 'opacity-100');
      setTimeout(() => hideToast(), 8000);
    }

    function checkForNewProducts(showImmediate = true) {
      const currentCount = products.length;
      const lastCount = parseInt(localStorage.getItem(STORAGE.productCount) || '0');
      if (currentCount > lastCount && showImmediate) showNewProductToast();
      localStorage.setItem(STORAGE.productCount, currentCount);
    }

    window.addEventListener('storage', (e) => {
      if (e.key === STORAGE.products) {
        products = JSON.parse(e.newValue);
        checkForNewProducts(true);
        rerenderCurrentPage();
        updateCartUI();
      }
    });

    // ---------- DATA ----------
    function loadData() {
      const stored = localStorage.getItem(STORAGE.products);
      if (stored) products = JSON.parse(stored);
      else {
        products = [
          { id: '1', name: 'Abstract Wall Art', description: 'Modern canvas print', priceUSD: 49.99, category: 'Wall Art', images: ['https://picsum.photos/id/101/400/400'], inStock: true },
          { id: '2', name: 'Velvet Cushion', description: 'Soft navy blue', priceUSD: 29.99, category: 'Cushions', images: ['https://picsum.photos/id/20/400/400'], inStock: true },
          { id: '3', name: 'LED Floor Lamp', description: 'Minimalist design', priceUSD: 89.99, category: 'Lighting', images: ['https://picsum.photos/id/106/400/400'], inStock: true }
        ];
        saveProducts();
      }
      if (!localStorage.getItem(STORAGE.productCount)) localStorage.setItem(STORAGE.productCount, products.length);
      else checkForNewProducts(true);
      logoUrl = localStorage.getItem(STORAGE.logo);
      if (logoUrl) {
        document.getElementById('logoImg').src = logoUrl;
        document.getElementById('logoImg').classList.remove('hidden');
        document.getElementById('logoText').classList.add('hidden');
      } else {
        document.getElementById('logoText').classList.remove('hidden');
      }
      const storedCart = localStorage.getItem(STORAGE.cart);
      cart = storedCart ? JSON.parse(storedCart) : { items: [] };
      updateCartUI();
    }
    function saveProducts() { localStorage.setItem(STORAGE.products, JSON.stringify(products)); localStorage.setItem(STORAGE.productCount, products.length); }
    function saveCart() { localStorage.setItem(STORAGE.cart, JSON.stringify(cart)); updateCartUI(); }

    // ---------- CURRENCY ----------
    async function fetchRates() {
      try {
        const res = await axios.get('https://api.exchangerate-api.com/v4/latest/USD');
        exchangeRates = res.data.rates;
      } catch(e) { console.error(e); }
    }
    function convertPrice(usd) { return usd * (exchangeRates[selectedCurrency.code] || 1); }
    function formatPrice(usd) {
      let val = convertPrice(usd);
      if (selectedCurrency.code === 'JPY') return selectedCurrency.symbol + Math.round(val);
      return selectedCurrency.symbol + val.toFixed(2);
    }
    function toggleCurrencyDropdown() { document.getElementById('currencyDropdown').classList.toggle('hidden'); }
    const currencies = [
      { code: 'USD', symbol: '$', name: 'US Dollar' }, { code: 'EUR', symbol: '€', name: 'Euro' },
      { code: 'GBP', symbol: '£', name: 'Pound' }, { code: 'GHS', symbol: '₵', name: 'Ghana Cedi' },
      { code: 'NGN', symbol: '₦', name: 'Naira' }, { code: 'CAD', symbol: 'C$', name: 'Canadian Dollar' },
      { code: 'AUD', symbol: 'A$', name: 'Australian Dollar' }, { code: 'JPY', symbol: '¥', name: 'Yen' }
    ];
    function setCurrency(curr) {
      selectedCurrency = curr;
      document.getElementById('currencyCode').innerText = curr.code;
      document.getElementById('currencyDropdown').classList.add('hidden');
      rerenderCurrentPage();
      updateCartUI();
    }

    // ---------- CART ----------
    function addToCart(productId, qty = 1) {
      const existing = cart.items.find(i => i.productId === productId);
      if (existing) existing.quantity += qty;
      else cart.items.push({ productId, quantity: qty });
      saveCart();
    }
    function updateCartItem(productId, qty) {
      const idx = cart.items.findIndex(i => i.productId === productId);
      if (qty <= 0) cart.items.splice(idx,1);
      else cart.items[idx].quantity = qty;
      saveCart();
    }
    function removeCartItem(productId) { updateCartItem(productId, 0); }
    function updateCartUI() {
      const count = cart.items.reduce((s,i)=>s+i.quantity,0);
      document.getElementById('cartCount').innerText = count;
      const container = document.getElementById('cartItems');
      if (!cart.items.length) { container.innerHTML = '<p class="text-gray-400">Cart is empty</p>'; document.getElementById('cartTotal').innerText = formatPrice(0); return; }
      let html = '', total = 0;
      cart.items.forEach(item => {
        const p = products.find(pr => pr.id === item.productId);
        if (!p) return;
        total += p.priceUSD * item.quantity;
        html += `<div class="flex gap-3 border-b border-gray-700 pb-3">
          <img src="${p.images[0]}" class="w-16 h-16 object-cover rounded">
          <div class="flex-1"><div class="font-semibold">${p.name}</div><div>${formatPrice(p.priceUSD)}</div>
          <div class="flex items-center gap-2 mt-1"><button onclick="updateCartItem('${p.id}',${item.quantity-1})" class="px-2 bg-gray-700 rounded">-</button>
          <span>${item.quantity}</span><button onclick="updateCartItem('${p.id}',${item.quantity+1})" class="px-2 bg-gray-700 rounded">+</button>
          <button onclick="removeCartItem('${p.id}')" class="text-red-500 ml-2"><i class="fas fa-trash"></i></button></div></div></div>`;
      });
      container.innerHTML = html;
      document.getElementById('cartTotal').innerHTML = formatPrice(total);
    }
    function showCart() { document.getElementById('cartSidebar').classList.remove('translate-x-full'); }
    function closeCart() { document.getElementById('cartSidebar').classList.add('translate-x-full'); }

    // ---------- WHATSAPP (redirect) with new Ghana number ----------
    function whatsappBuy() {
      if (!cart.items.length) {
        alert('Your cart is empty');
        return;
      }
      let msg = "🛍️ *Jinja Order* 🛍️\n";
      cart.items.forEach((item, idx) => {
        const p = products.find(pr => pr.id === item.productId);
        if (p) {
          msg += `${idx+1}. ${p.name} x${item.quantity} - ${formatPrice(p.priceUSD * item.quantity)}\n`;
        }
      });
      const total = cart.items.reduce((t,i) => {
        const p = products.find(pr => pr.id === i.productId);
        return t + (p ? p.priceUSD * i.quantity : 0);
      }, 0);
      msg += `\n*Total: ${formatPrice(total)}*\nLocation: Accra, Ghana`;
      const encodedMsg = encodeURIComponent(msg);
      // New WhatsApp number: +233 54 631 1518  -> 233546311518
      window.location.href = `https://wa.me/233546311518?text=${encodedMsg}`;
    }

    // ---------- RENDER PAGES ----------
    function rerenderCurrentPage() {
      if (currentPage === 'home') showHome();
      else if (currentPage === 'shop') showShop();
      else if (currentPage === 'adminLogin') showAdminLogin();
      else if (currentPage === 'adminPanel') showAdminPanel();
    }

    function showHome() {
      currentPage = 'home';
      document.getElementById('app').innerHTML = `
        <div class="relative h-screen flex items-center justify-center overflow-hidden">
          <div class="absolute inset-0 bg-gradient-to-r from-black via-black/80 to-transparent z-10"></div>
          <div class="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1616486338812-3dadae4b4ace?q=80&w=2070')] bg-cover bg-center"></div>
          <div class="container mx-auto px-4 relative z-20 text-center md:text-left">
            <h1 class="text-5xl md:text-7xl font-bold mb-6 animate-fade-in-up">Transform Your Space<br><span class="text-[#0A192F]">with Jinja</span></h1>
            <p class="text-xl text-gray-300 mb-8 max-w-2xl">Premium room decoration items from Accra to the world.</p>
            <button onclick="showPage('shop')" class="bg-[#0A192F] text-white px-8 py-4 rounded-lg text-lg font-semibold hover:scale-105 transition">Shop Now</button>
          </div>
        </div>
        <div class="py-20 bg-black text-center"><h2 class="text-3xl font-bold">Featured Products</h2><div class="grid grid-cols-1 md:grid-cols-3 gap-6 mt-10 px-4" id="featuredGrid"></div></div>
      `;
      const featured = products.slice(0,3);
      let gridHtml = '';
      featured.forEach(p => {
        gridHtml += `<div class="bg-gray-900 rounded-xl overflow-hidden card-hover relative">
          <img src="${p.images[0]}" class="h-56 w-full object-cover">
          <div class="price-badge">${formatPrice(p.priceUSD)}</div>
          <div class="p-4">
            <h3 class="font-bold text-xl">${p.name}</h3>
            <button onclick="addToCart('${p.id}')" class="mt-3 w-full bg-[#0A192F] py-2 rounded">Add to Cart</button>
          </div>
        </div>`;
      });
      document.getElementById('featuredGrid').innerHTML = gridHtml;
    }

    function showShop() {
      currentPage = 'shop';
      document.getElementById('app').innerHTML = `
        <div class="container mx-auto px-4 py-8">
          <h1 class="text-3xl font-bold mb-6">All Products</h1>
          <div class="flex flex-wrap gap-4 mb-6">
            <input type="text" id="searchInput" placeholder="Search..." class="bg-gray-800 px-4 py-2 rounded flex-1">
            <select id="categoryFilter" class="bg-gray-800 px-4 py-2 rounded"></select>
          </div>
          <div id="productsGrid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6"></div>
        </div>
      `;
      const categories = ['all', ...new Set(products.map(p=>p.category))];
      let catHtml = '';
      categories.forEach(c => catHtml += `<option value="${c}">${c}</option>`);
      document.getElementById('categoryFilter').innerHTML = catHtml;
      document.getElementById('categoryFilter').onchange = () => filterProducts();
      document.getElementById('searchInput').oninput = () => filterProducts();
      filterProducts();
    }

    function filterProducts() {
      const category = document.getElementById('categoryFilter').value;
      const search = document.getElementById('searchInput').value.toLowerCase();
      let filtered = products;
      if (category !== 'all') filtered = filtered.filter(p => p.category === category);
      if (search) filtered = filtered.filter(p => p.name.toLowerCase().includes(search) || p.description.toLowerCase().includes(search));
      const grid = document.getElementById('productsGrid');
      if (!grid) return;
      let html = '';
      filtered.forEach(p => {
        html += `<div class="bg-gray-900 rounded-xl overflow-hidden card-hover relative">
          <img src="${p.images[0]}" class="h-56 w-full object-cover">
          <div class="price-badge">${formatPrice(p.priceUSD)}</div>
          <div class="p-4">
            <div class="text-sm text-[#0A192F]">${p.category}</div>
            <h3 class="font-bold text-lg">${p.name}</h3>
            <button onclick="addToCart('${p.id}')" class="mt-3 w-full bg-[#0A192F] py-2 rounded transition">Add to Cart</button>
          </div>
        </div>`;
      });
      grid.innerHTML = html || '<p class="text-gray-400 col-span-full text-center">No products found</p>';
    }

    // ---------- ADMIN ----------
    function showAdminLogin() {
      currentPage = 'adminLogin';
      document.getElementById('app').innerHTML = `
        <div class="max-w-md mx-auto mt-20 bg-gray-900 p-8 rounded-xl">
          <h2 class="text-2xl font-bold mb-4">Admin Login</h2>
          <input type="password" id="adminPassInput" class="w-full p-3 mb-3 bg-black rounded" placeholder="Password">
          <button onclick="verifyAdmin()" class="w-full bg-[#0A192F] py-3 rounded">Login</button>
        </div>
      `;
    }
    function verifyAdmin() {
      const pass = document.getElementById('adminPassInput').value;
      if (pass === 'admin123') {
        isAdminLoggedIn = true;
        document.getElementById('adminNavBtn').classList.remove('hidden');
        showAdminPanel();
      } else alert('Wrong password');
    }
    function showAdminPanel() {
      if (!isAdminLoggedIn) { showAdminLogin(); return; }
      currentPage = 'adminPanel';
      let html = `<div class="container mx-auto px-4 py-8"><div class="flex justify-between items-center mb-6"><h1 class="text-3xl font-bold">Admin Panel</h1><button onclick="openProductModal()" class="bg-[#0A192F] px-4 py-2 rounded">+ Add Product</button></div><div class="grid gap-3">`;
      products.forEach(p => {
        html += `<div class="bg-gray-800 p-4 rounded flex justify-between items-center"><div class="flex items-center gap-3"><img src="${p.images[0]}" class="w-12 h-12 object-cover rounded"><div><strong>${p.name}</strong><br><span class="text-sm text-gray-400">$${p.priceUSD}</span></div></div><div><button onclick="editProduct('${p.id}')" class="text-blue-400 mr-3">Edit</button><button onclick="deleteProduct('${p.id}')" class="text-red-400">Delete</button></div></div>`;
      });
      html += `</div><div class="mt-8"><h3 class="text-xl font-bold mb-2">Site Logo</h3><input type="file" id="logoUploadAdmin" accept="image/*"><button onclick="uploadLogo()" class="mt-2 bg-[#0A192F] px-4 py-2 rounded">Upload Logo</button></div></div>`;
      document.getElementById('app').innerHTML = html;
    }
    function openProductModal(productId = null) {
      editingProductId = productId;
      document.getElementById('modalTitle').innerText = productId ? 'Edit Product' : 'Add Product';
      document.getElementById('productForm').reset();
      document.getElementById('existingImagesContainer').innerHTML = '';
      if (productId) {
        const p = products.find(pr => pr.id === productId);
        if (p) {
          document.getElementById('prodName').value = p.name;
          document.getElementById('prodDesc').value = p.description;
          document.getElementById('prodPrice').value = p.priceUSD;
          document.getElementById('prodCategory').value = p.category;
          document.getElementById('prodInStock').checked = p.inStock;
          let imgsHtml = '';
          p.images.forEach((img, idx) => {
            imgsHtml += `<div class="relative"><img src="${img}" class="w-16 h-16 object-cover"><button type="button" onclick="removeTempImage(${idx})" class="absolute -top-2 -right-2 bg-red-500 rounded-full w-5 h-5 text-xs">x</button></div>`;
          });
          document.getElementById('existingImagesContainer').innerHTML = imgsHtml;
          window.existingImages = [...p.images];
        }
      } else window.existingImages = [];
      document.getElementById('adminModal').classList.remove('hidden');
    }
    function closeAdminModal() { document.getElementById('adminModal').classList.add('hidden'); editingProductId = null; }
    function removeTempImage(idx) { window.existingImages.splice(idx,1); openProductModal(editingProductId); }
    document.getElementById('productForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const name = document.getElementById('prodName').value, desc = document.getElementById('prodDesc').value;
      const priceUSD = parseFloat(document.getElementById('prodPrice').value);
      const category = document.getElementById('prodCategory').value, inStock = document.getElementById('prodInStock').checked;
      let images = window.existingImages || [];
      const files = document.getElementById('prodImages').files;
      let processed = 0;
      if (files.length === 0) finalSave();
      else for (let f of files) {
        const reader = new FileReader();
        reader.onload = ev => { images.push(ev.target.result); processed++; if (processed === files.length) finalSave(); };
        reader.readAsDataURL(f);
      }
      function finalSave() {
        if (editingProductId) {
          const idx = products.findIndex(p => p.id === editingProductId);
          products[idx] = { ...products[idx], name: name, description: desc, priceUSD, category, inStock, images };
        } else products.push({ id: Date.now().toString(), name, description: desc, priceUSD, category, images, inStock });
        saveProducts();
        showNewProductToast();
        closeAdminModal();
        showAdminPanel();
        if (currentPage === 'shop') showShop();
        else if (currentPage === 'home') showHome();
      }
    });
    async function deleteProduct(id) { if (confirm('Delete?')) { products = products.filter(p => p.id !== id); saveProducts(); showAdminPanel(); if (currentPage === 'shop') showShop(); } }
    function editProduct(id) { openProductModal(id); }
    async function uploadLogo() {
      const file = document.getElementById('logoUploadAdmin').files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = e => { logoUrl = e.target.result; localStorage.setItem(STORAGE.logo, logoUrl); document.getElementById('logoImg').src = logoUrl; document.getElementById('logoImg').classList.remove('hidden'); document.getElementById('logoText').classList.add('hidden'); alert('Logo updated'); };
      reader.readAsDataURL(file);
    }
    function showPage(page) {
      if (page === 'home') showHome();
      else if (page === 'shop') showShop();
      else if (page === 'adminPanel') isAdminLoggedIn ? showAdminPanel() : showAdminLogin();
    }

    // Periodic check for new products
    setInterval(() => {
      const stored = localStorage.getItem(STORAGE.products);
      if (stored) { const np = JSON.parse(stored); if (np.length !== products.length) { products = np; checkForNewProducts(true); rerenderCurrentPage(); updateCartUI(); } }
    }, 30000);

    // Bootstrap
    loadData();
    fetchRates().then(() => {
      setInterval(fetchRates, 3600000);
      showHome();
      let currHtml = '';
      currencies.forEach(c => currHtml += `<button onclick="setCurrency({code:'${c.code}',symbol:'${c.symbol}'})" class="block w-full text-left px-4 py-2 hover:bg-[#0A192F]/30">${c.code} - ${c.name}</button>`);
      document.getElementById('currencyDropdown').innerHTML = currHtml;
    });
  </script>
</body>
</html>
